<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>silly little games</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>
  <header>
    <h1>silly little games</h1>
    <input
      id="search"
      type="search"
      placeholder="search games..."
      autocomplete="off"
      aria-label="search games"
    >
  </header>
  <main class="games" id="games"></main>
  <p id="empty" class="empty" hidden>no games match that search.</p>
  <footer>
    <p>vanilla html/js · <a href="https://github.com/Mystic-Poe/silly-little-games">source</a></p>
  </footer>
  <script src="./app.js"></script>
</body>
</html>
