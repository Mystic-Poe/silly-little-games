<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>silly little games</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>
  <header>
    <h1>silly little games</h1>
    <input
      id="search"
      type="search"
      placeholder="search games..."
      autocomplete="off"
      aria-label="search games"
    >
  </header>
  <main class="games" id="games">
    <a href="./games/brick-breaker/" class="card" data-name="brick breaker" data-tags="action arcade casual">
      <div class="window">
        <div class="window-bar">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
          <span class="window-title">brick breaker</span>
        </div>
        <div class="preview">
          <iframe src="./games/brick-breaker/" title="brick breaker preview" loading="lazy" scrolling="no" tabindex="-1"></iframe>
        </div>
      </div>
      <div class="meta">
        <h2>brick breaker</h2>
        <p>action · arcade · casual</p>
      </div>
    </a>
    <a href="./games/memory-match/" class="card" data-name="memory match" data-tags="puzzle memory casual chill">
      <div class="window">
        <div class="window-bar">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
          <span class="window-title">memory match</span>
        </div>
        <div class="preview">
          <iframe src="./games/memory-match/" title="memory match preview" loading="lazy" scrolling="no" tabindex="-1"></iframe>
        </div>
      </div>
      <div class="meta">
        <h2>memory match</h2>
        <p>puzzle · memory · chill</p>
      </div>
    </a>
  </main>
  <p id="empty" class="empty" hidden>no games match that search.</p>
  <footer>
    <p>vanilla html/js · <a href="https://github.com/Mystic-Poe/silly-little-games">source</a></p>
  </footer>
  <script src="./app.js"></script>
</body>
</html>
